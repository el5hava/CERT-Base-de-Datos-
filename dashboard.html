<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0f1e">
  <title>CERT Maps 3.0 – Inteligencia Geoespacial</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <!-- ═══════════════════════════════════════════
       FIREBASE 3.0 – incluye Storage + transacción
  ═══════════════════════════════════════════ -->
  <script type="module">
    import { initializeApp }   from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs,
             onSnapshot, runTransaction, increment, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getStorage, ref, uploadString, getDownloadURL }
      from "https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js";
    import { getAuth, signInAnonymously, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyBvDO1Guh6vnVIiOciqqEQ1jZe0Q5zThwM",
      authDomain:        "cert-tecate.firebaseapp.com",
      projectId:         "cert-tecate",
      storageBucket:     "cert-tecate.firebasestorage.app",
      messagingSenderId: "802566499801",
      appId:             "1:802566499801:web:f1821be505a9ae87f0fdc8"
    };

    const app     = initializeApp(firebaseConfig);
    const db      = getFirestore(app);
    const storage = getStorage(app);
    const auth    = getAuth(app);

    /* ── Folio único global (mismo algoritmo que index 3.0) ── */
    async function reserveFolio(prefix) {
      const counterRef = doc(db, 'cert_counters', 'global');
      const dateStr = new Date().toISOString().slice(0,10).replace(/-/g,'');
      let num;
      await runTransaction(db, async tx => {
        const snap = await tx.get(counterRef);
        num = (snap.exists() ? snap.data().total : 0) + 1;
        tx.set(counterRef, { total: increment(1) }, { merge: true });
      });
      return `CERT-${dateStr}-${prefix}-${String(num).padStart(4,'0')}`;
    }

    /* ── Subir foto a Storage ── */
    async function uploadPhoto(base64, path) {
      const storageRef = ref(storage, path);
      await uploadString(storageRef, base64, 'data_url');
      return await getDownloadURL(storageRef);
    }

    window.certCloud = { db, storage, auth, collection, addDoc, getDocs, doc,
                         reserveFolio, uploadPhoto };
    window.allRecords = [];

    signInAnonymously(auth).catch(() => {});

    onAuthStateChanged(auth, user => {
      if (!user) return;
      const badge = document.getElementById('conn-badge');
      if (badge) { badge.textContent = 'EN LÍNEA'; badge.className = 'conn-badge online'; }

      onSnapshot(collection(db, 'cert_registros'), snap => {
        window.allRecords = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));
        refreshCounters();
        updateSidebarContent();
        renderMapMarkers();
      });
    });

    window.addEventListener('online',  () => setBadge(true));
    window.addEventListener('offline', () => setBadge(false));
    function setBadge(on) {
      const b = document.getElementById('conn-badge');
      if (!b) return;
      b.textContent = on ? 'EN LÍNEA' : 'SIN RED';
      b.className = 'conn-badge ' + (on ? 'online' : 'offline');
    }
  </script>

  <style>
    :root {
      --ink:   #0a0f1e;
      --ink2:  #1e2740;
      --panel: #0f172a;
      --line:  #1e293b;
      --muted: #64748b;
      --mono:  'Space Mono', monospace;
      --sans:  'DM Sans', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin:0; padding:0; }
    html, body { height: 100%; overflow: hidden; }
    body { font-family: var(--sans); background: var(--ink); color: #e2e8f0; }

    /* ── Scrollbar ── */
    .noscroll::-webkit-scrollbar { display:none; }
    .noscroll { -ms-overflow-style:none; scrollbar-width:none; }

    /* ── Top nav ── */
    .topnav {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      display: flex; overflow-x: auto;
      flex-shrink: 0; z-index: 200;
    }
    .topnav::-webkit-scrollbar { display:none; }
    .tnav-btn {
      flex-shrink: 0; padding: 12px 18px;
      background: transparent; border: none;
      border-bottom: 3px solid transparent;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .07em;
      color: #64748b; cursor: pointer; white-space: nowrap;
      transition: color .2s, border-color .2s;
    }
    .tnav-btn.active-blue  { color: #60a5fa; border-bottom-color: #3b82f6; background: rgba(59,130,246,.08); }
    .tnav-btn.active-amber { color: #fbbf24; border-bottom-color: #f59e0b; background: rgba(245,158,11,.08); }

    /* ── Layout ── */
    .layout { display: flex; flex: 1; overflow: hidden; position: relative; }

    /* ── Sidebar ── */
    .sidebar {
      width: 360px; flex-shrink: 0;
      background: var(--panel);
      border-right: 1px solid var(--line);
      display: flex; flex-direction: column;
      height: 100%; overflow: hidden;
      z-index: 100;
    }
    @media (max-width: 768px) {
      .sidebar {
        position: absolute; bottom: 0; left: 0; right: 0;
        width: 100%; height: 52vh; border-right: none;
        border-top: 1px solid var(--line);
      }
    }
    .sidebar-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      flex-shrink: 0;
    }
    .sidebar-body {
      flex: 1; overflow-y: auto; padding: 14px 16px;
    }
    .sidebar-body::-webkit-scrollbar { width: 3px; }
    .sidebar-body::-webkit-scrollbar-track { background: transparent; }
    .sidebar-body::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
    .sidebar-foot {
      padding: 14px 16px;
      border-top: 1px solid var(--line);
      flex-shrink: 0;
    }

    /* ── Conn badge ── */
    .conn-badge {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      padding: 3px 9px; border-radius: 99px; letter-spacing: .07em;
    }
    .conn-badge.online  { background: #14532d; color: #86efac; }
    .conn-badge.offline { background: #7f1d1d; color: #fca5a5; }
    .conn-badge.pending { background: #1e293b; color: #64748b; }

    /* ── Stat pills ── */
    .stat-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
    .stat-pill {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; padding: 6px 12px;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      color: #94a3b8; display: flex; align-items: center; gap: 5px;
    }
    .stat-pill span { color: #e2e8f0; }

    /* ── Filter selects ── */
    .filter-row { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
    .f-select {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; padding: 5px 10px;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      color: #94a3b8; cursor: pointer; flex: 1; min-width: 100px;
    }
    .f-select:focus { outline: none; border-color: #3b82f6; }

    /* ── Sidebar legend item ── */
    .leg-item { display: flex; align-items: center; gap: 10px; font-size: 12px; font-weight: 500; color: #cbd5e1; padding: 6px 0; }

    /* ── Sub-filter checkbox row ── */
    .sf-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 12px; border-radius: 10px;
      border: 1px solid #1e293b; background: rgba(255,255,255,.03);
      margin-bottom: 6px; cursor: pointer; transition: background .15s;
    }
    .sf-row:hover { background: rgba(255,255,255,.07); }
    .sf-row.disabled { opacity: .35; pointer-events: none; }
    .sf-count-bad  { background: rgba(239,68,68,.15);  color: #f87171; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 6px; font-family: var(--mono); }
    .sf-count-ok   { background: rgba(34,197,94,.12);  color: #4ade80; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 6px; font-family: var(--mono); }

    /* ── Evento card ── */
    .ev-card {
      background: #1e293b; border: 1px solid rgba(245,158,11,.3);
      border-radius: 12px; padding: 12px 14px; margin-bottom: 8px;
      cursor: pointer; transition: background .15s;
    }
    .ev-card:hover { background: #263045; }
    .ev-title { font-size: 12px; font-weight: 700; color: #fbbf24; margin-bottom: 5px; }
    .ev-meta  { font-family: var(--mono); font-size: 9px; color: #64748b; }

    /* ── Add action btn ── */
    .add-btn {
      width: 100%; padding: 13px; border: none; border-radius: 12px;
      font-family: var(--mono); font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      cursor: pointer; transition: background .15s, transform .1s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .add-btn.idle   { background: #d97706; color: #000; }
    .add-btn.active-mode { background: #dc2626; color: #fff; }
    .add-btn:active { transform: scale(.98); }
    .add-hint {
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      color: #fbbf24; text-align: center; margin-top: 8px;
      animation: blink 1.2s ease infinite; display: none;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── Map ── */
    #map { height: 100%; width: 100%; z-index: 10; }
    .crosshair { cursor: crosshair !important; }

    /* ── Markers ── */
    .sev-marker {
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; font-weight: 900; color: #fff;
      border: 2px solid rgba(255,255,255,.85);
      box-shadow: 0 3px 10px rgba(0,0,0,.5);
      transition: transform .2s;
    }
    .sev-marker:hover { transform: scale(1.25); }
    .sev-high { background: rgba(239,68,68,.95); border-color: #7f1d1d; animation: pulsered 2s infinite; box-shadow: 0 0 20px rgba(239,68,68,.8); }
    .sev-med  { background: rgba(245,158,11,.95); border-color: #78350f; box-shadow: 0 0 12px rgba(245,158,11,.5); }
    .sev-low  { background: rgba(34,197,94,.95);  border-color: #14532d; }
    .m-admin  { background: #eab308; color: #000; border: 2px solid #000; border-radius: 50%; display:flex; align-items:center; justify-content:center; font-size:14px; box-shadow:0 3px 10px rgba(0,0,0,.5); cursor:pointer; transition:.2s; }
    .m-admin:hover { transform: scale(1.2) translateY(-4px); }
    @keyframes pulsered { 0%{box-shadow:0 0 0 0 rgba(239,68,68,.7)} 70%{box-shadow:0 0 0 14px rgba(239,68,68,0)} 100%{box-shadow:0 0 0 0 rgba(239,68,68,0)} }

    /* ── Leaflet tooltip ── */
    .leaflet-tooltip.ctip {
      background: rgba(10,15,30,.96); border: 1px solid #334155;
      color: #e2e8f0; border-radius: 10px; padding: 9px 13px;
      font-family: var(--sans); box-shadow: 0 8px 20px rgba(0,0,0,.5);
    }
    .leaflet-tooltip-top.ctip::before { border-top-color: rgba(10,15,30,.96); }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: #1e293b; color: #e2e8f0;
      font-family: var(--mono); font-size: 11px; font-weight: 700;
      padding: 10px 20px; border-radius: 99px; z-index: 9999;
      pointer-events: none; opacity: 0; white-space: nowrap;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      box-shadow: 0 6px 24px rgba(0,0,0,.4);
    }
    #toast.show  { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.ok    { background: #14532d; color: #86efac; }
    #toast.err   { background: #7f1d1d; color: #fca5a5; }
    #toast.warn  { background: #78350f; color: #fde68a; }

    /* ── Modals ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(10,15,30,.92);
      display: none; align-items: center; justify-content: center;
      z-index: 500; padding: 16px; overflow-y: auto;
    }
    .overlay.open { display: flex; }
    .modal-box {
      background: #fff; color: #0f172a;
      border-radius: 24px; width: 100%; max-width: 900px;
      max-height: 95dvh; overflow: hidden;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 64px rgba(0,0,0,.6);
    }
    .modal-head {
      background: #0f172a; color: #e2e8f0;
      padding: 20px 24px;
      border-bottom: 3px solid #2563eb;
      flex-shrink: 0; position: relative;
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(255,255,255,.1); border: none;
      color: #e2e8f0; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .modal-close:hover { background: #dc2626; }
    .modal-body { padding: 20px 24px; overflow-y: auto; flex: 1; background: #f8fafc; }

    /* Detail modal sub-sections */
    .detail-sec { background: #fff; border-radius: 14px; border: 1px solid #e2e8f0; padding: 16px; margin-bottom: 14px; }
    .detail-sec-title { font-family: var(--mono); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: #64748b; border-bottom: 1px solid #f1f5f9; padding-bottom: 8px; margin-bottom: 12px; }
    .ind-row { font-size: 12px; padding: 5px 8px; border-radius: 7px; margin-bottom: 3px; display: flex; justify-content: space-between; font-weight: 500; }
    .ind-M { background: #fff5f5; color: #991b1b; }
    .ind-R { background: #fffbeb; color: #92400e; }
    .ind-B { background: #f0fdf4; color: #166534; }

    /* foto grid */
    .foto-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 8px; }
    .foto-grid img { width:100%; height:130px; object-fit:cover; border-radius:10px; cursor:pointer; border:2px solid #e2e8f0; transition:opacity .15s; }
    .foto-grid img:hover { opacity:.82; }
    .foto-meta { font-family:var(--mono); font-size:9px; color:#64748b; margin-top:3px; text-align:center; }

    /* Create event modal */
    .create-box { background:#fff; border-radius:24px; width:100%; max-width:640px; max-height:95dvh; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 24px 64px rgba(0,0,0,.6); }
    .create-head { background:#d97706; color:#000; padding:18px 22px; flex-shrink:0; display:flex; justify-content:space-between; align-items:center; }
    .create-body { padding:20px 22px; overflow-y:auto; flex:1; background:#fafafa; }
    .cf-label { display:block; font-family:var(--mono); font-size:9px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; color:#64748b; margin-bottom:4px; }
    .cf-input { width:100%; background:#fff; border:1.5px solid #e2e8f0; border-radius:10px; padding:9px 12px; font-size:13px; font-weight:500; color:#0f172a; }
    .cf-input:focus { outline:none; border-color:#d97706; }
    .cf-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media(max-width:500px){ .cf-grid{grid-template-columns:1fr;} }

    /* Layer toggle */
    .layer-toggle {
      position: absolute; top: 12px; right: 12px; z-index: 400;
      background: var(--panel); border: 1px solid var(--line);
      border-radius: 10px; padding: 6px 12px;
      font-family: var(--mono); font-size: 9px; font-weight: 700;
      color: #94a3b8; cursor: pointer; text-transform: uppercase;
      letter-spacing: .06em; transition: background .15s;
    }
    .layer-toggle:hover { background: #1e293b; color: #e2e8f0; }
  </style>
</head>
<body style="display:flex; flex-direction:column; height:100dvh;">

<!-- ════ MODAL DETALLE ═══ -->

  <div class="modal-box">

<!-- ════ MODAL CREAR EVENTO ═══ -->
<div id="createModal" class="overlay">
  <div class="create-box">
    <div class="create-head">
      <div>
        <div style="font-family:var(--mono); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.07em;">Agendar Proyecto / Evento</div>
        <div style="font-size:11px; opacity:.75; margin-top:2px;">GPS: <span id="create-coords" style="font-family:var(--mono);"></span></div>
      </div>
      <button onclick="closeOverlay('createModal')" style="background:rgba(0,0,0,.15); border:none; border-radius:50%; width:32px; height:32px; cursor:pointer; font-size:14px; display:flex; align-items:center; justify-content:center; color:#000;">✕</button>
    </div>
    <div class="create-body">
      <form id="form-evento" style="display:flex; flex-direction:column; gap:14px;">
        <div>
          <label class="cf-label">Tipo de Registro</label>
          <select id="c-tipo" class="cf-input">
            <option value="Jornada de Limpieza">🧹 Jornada de Limpieza / Acción Ciudadana</option>

<!-- ════ SCRIPTS ═══ -->
<script>
/* ═══════════════════════════════════════════
   ESTRUCTURA DE SECCIONES (igual que index 3.0)
═══════════════════════════════════════════ */
const SECCIONES = [
  { titulo:"Infraestructura Urbana",  prefix:"infra", items:["Flujo del agua","Contaminación (Basura)","Sedimentación","Obstrucciones","Muros de contención","Estado de estructuras","Descargas pluviales","Cantidad de puentes","Seguridad de cruces"] },
  { titulo:"Medio Ambiente",          prefix:"amb",   items:["Vegetación en cauce","Vegetación ribereña","Presencia de fauna","Áreas naturales","Riesgo inundación","Erosión suelo","Acumulación residuos","Infiltración","Basureros clandestinos","Descargas contaminantes"] },
  { titulo:"Desarrollo Social",       prefix:"soc",   items:["Viviendas zona federal","Construcciones irregulares","Invasión borde río","Uso informal suelo","Personas situación calle","Espacios abandonados","Áreas comunitarias"] },
  { titulo:"Seguridad Ciudadana",     prefix:"seg",   items:["Calles cercanas","Banquetas/Accesos","Alumbrado público","Equipamiento urbano","Vigilancia de zona","Zona peligrosa / Insegura","Personas en situación de calle","Grafitis / Vandalismo","Muestras de fogatas","Tránsito de personas"] }
];

/* ═══════════════════════════════════════════
   ESTADO
═══════════════════════════════════════════ */
let currentTab      = 'all';
let activeSubFilters = new Set();
let filterInspector = '';
let filterFecha     = '';
let isAddMode       = false;
let tempCoords      = null;
let adminPhotoB64   = null;
let mapMarkers      = [];
let cartoLayer, satelliteLayer, currentLayerMode = 'streets';

/* ═══════════════════════════════════════════
   MAPA
═══════════════════════════════════════════ */
const map = L.map('map', { zoomControl: false }).setView([32.5683, -116.6268], 14);
L.control.zoom({ position: 'bottomright' }).addTo(map);

cartoLayer = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 20
}).addTo(map);

satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  attribution: '&copy; Esri', maxZoom: 20
});

function toggleMapLayer() {
  const btn = document.getElementById('layer-toggle-btn');
  if (currentLayerMode === 'streets') {
    map.removeLayer(cartoLayer);
    map.addLayer(satelliteLayer);
    currentLayerMode = 'satellite';
    btn.textContent = '🗺 Calles';
  } else {
    map.removeLayer(satelliteLayer);
    map.addLayer(cartoLayer);
    currentLayerMode = 'streets';
    btn.textContent = '🛰 Satélite';
  }
}

/* ═══════════════════════════════════════════
   CONTADORES Y FILTROS DINÁMICOS
═══════════════════════════════════════════ */
function refreshCounters() {
  const all    = window.allRecords || [];
  const today  = new Date().toLocaleDateString('es-MX');
  const todayR = all.filter(r => r.fecha_captura === today);

  // Críticos: score global ≥ 12
  const critCount = all.filter(r => !isAdminRecord(r) && calcGravity(r,'all').score >= 12).length;

  document.getElementById('cnt-total').textContent    = all.length;
  document.getElementById('cnt-today').textContent    = todayR.length;
  document.getElementById('cnt-critical').textContent = critCount;

  // Poblar selects de filtro
  const inspSet  = new Set(all.map(r => r.inspector).filter(Boolean));
  const fechaSet = new Set(all.map(r => r.fecha_captura).filter(Boolean));

  const selInsp = document.getElementById('filter-inspector');
  const selFech = document.getElementById('filter-fecha');
  const prevInsp = selInsp.value;
  const prevFech = selFech.value;

  selInsp.innerHTML = '<option value="">Todos los inspectores</option>' +
    [...inspSet].sort().map(i => `<option value="${i}" ${i===prevInsp?'selected':''}>${i}</option>`).join('');
  selFech.innerHTML = '<option value="">Todas las fechas</option>' +
    [...fechaSet].sort().reverse().map(f => `<option value="${f}" ${f===prevFech?'selected':''}>${f}</option>`).join('');
}

function applyFilters() {
  filterInspector = document.getElementById('filter-inspector').value;
  filterFecha     = document.getElementById('filter-fecha').value;
  updateSidebarContent();
  renderMapMarkers();
}

function getFilteredRecords() {
  return (window.allRecords || []).filter(r => {
    if (filterInspector && r.inspector !== filterInspector) return false;
    if (filterFecha     && r.fecha_captura !== filterFecha) return false;
    return true;
  });
}

/* ═══════════════════════════════════════════
   TABS
═══════════════════════════════════════════ */
function switchTab(tab, btn) {
  currentTab = tab;
  activeSubFilters.clear();
  document.querySelectorAll('.tnav-btn').forEach(b => b.className = 'tnav-btn');
  if (btn) btn.className = 'tnav-btn ' + (tab === 'acciones' ? 'active-amber' : 'active-blue');
  const titles = { all:'Consolidado General', infra:'Infraestructura Urbana',
    amb:'Medio Ambiente', soc:'Desarrollo Social', seg:'Seguridad Ciudadana', acciones:'Agenda y Proyectos' };
  document.getElementById('sidebar-subtitle').textContent = titles[tab] || '';
  updateSidebarContent();
  renderMapMarkers();
}

/* ═══════════════════════════════════════════
   SIDEBAR DINÁMICO
═══════════════════════════════════════════ */
function updateSidebarContent() {
  const el = document.getElementById('dynamic-sidebar');
  const records = getFilteredRecords();

  if (currentTab === 'all') {
    el.innerHTML = `
      <div style="background:#1e293b; border-radius:12px; padding:14px; margin-bottom:14px;">
        <div style="font-family:var(--mono); font-size:9px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.07em; border-bottom:1px solid #334155; padding-bottom:8px; margin-bottom:10px;">Índice de Prioridad</div>
        <div class="leg-item"><span style="width:16px;height:16px;border-radius:50%;background:#ef4444;flex-shrink:0;box-shadow:0 0 8px rgba(239,68,68,.7);"></span> Atención Urgente</div>
        <div class="leg-item"><span style="width:16px;height:16px;border-radius:50%;background:#f59e0b;flex-shrink:0;"></span> Prevención a Corto Plazo</div>
        <div class="leg-item"><span style="width:16px;height:16px;border-radius:50%;background:#22c55e;flex-shrink:0;"></span> Zona Estable</div>
        <div class="leg-item" style="margin-top:8px; padding-top:8px; border-top:1px solid #334155;"><span style="width:16px;height:16px;border-radius:50%;background:#eab308;flex-shrink:0; display:flex;align-items:center;justify-content:center;font-size:9px;">⭐</span> Proyecto / Agenda</div>
      </div>
      <div style="background:#1e293b; border-radius:12px; padding:14px;">
        <div style="font-family:var(--mono); font-size:9px; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:.07em; border-bottom:1px solid #334155; padding-bottom:8px; margin-bottom:10px;">Resumen por Sección</div>
        ${SECCIONES.map(sec => {
          const fallos = records.filter(r => !isAdminRecord(r)).reduce((acc,r) => {
            return acc + sec.items.filter((_,i) => r[`${sec.prefix}_v_${i}`]==='M').length;
          }, 0);
          return `<div style="display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid #1e293b;">
            <span style="color:#cbd5e1;">${sec.titulo}</span>
            <span style="${fallos>0?'color:#f87171;':'color:#4ade80;'} font-family:var(--mono);font-size:10px;font-weight:700;">${fallos>0?fallos+' críticos':'Limpio'}</span>
          </div>`;
        }).join('')}
      </div>`;

  } else if (currentTab === 'acciones') {
    const eventos = records.filter(r => isAdminRecord(r));
    let html = `<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;">${eventos.length} Evento${eventos.length!==1?'s':''} registrado${eventos.length!==1?'s':''}</div>`;
    if (eventos.length === 0) {
      html += `<div style="background:#1e293b;border-radius:12px;padding:20px;text-align:center;font-size:12px;color:#475569;font-weight:500;">No hay proyectos agendados.</div>`;
    } else {
      eventos.forEach(ev => {
        html += `<div class="ev-card" onclick="centerOn(${ev.lat},${ev.lng})">
          <div class="ev-title">${ev.gestion_titulo || 'Evento sin título'}</div>
          <div class="ev-meta">${ev.gestion_tipo || '-'}</div>
          <div class="ev-meta" style="margin-top:4px;">📅 ${ev.gestion_fecha||'Sin fecha'} · ⏰ ${ev.gestion_hora||'--:--'}</div>
        </div>`;
      });
    }
    el.innerHTML = html;

  } else {
    const sec = SECCIONES.find(s => s.prefix === currentTab);
    if (!sec) return;
    let html = `<div style="background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:10px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#93c5fd;">Selecciona indicadores para filtrar los puntos del mapa donde falló esa métrica.</div>
    <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">Filtros de Indicador</div>`;
    sec.items.forEach((item, idx) => {
      let fallos = records.filter(r => !isAdminRecord(r) && (r.tipo === currentTab || r.tipo === 'completa')).filter(r => r[`${sec.prefix}_v_${idx}`]==='M'||r[`${sec.prefix}_v_${idx}`]==='R').length;
      const checked = activeSubFilters.has(idx) ? 'checked' : '';
      const disabled = fallos === 0 ? 'disabled' : '';
      html += `<label class="sf-row${fallos===0?' disabled':''}">
        <div style="display:flex;align-items:center;gap:10px;">
          <input type="checkbox" value="${idx}" ${checked} ${disabled} onchange="toggleSubFilter(${idx})" style="accent-color:#3b82f6;width:14px;height:14px;">
          <span style="font-size:12px;font-weight:500;color:${fallos>0?'#cbd5e1':'#475569'};">${item}</span>
        </div>
        ${fallos>0?`<span class="sf-count-bad">${fallos}</span>`:`<span class="sf-count-ok">OK</span>`}
      </label>`;
    });
    el.innerHTML = html;
  }
}

function toggleSubFilter(idx) {
  if (activeSubFilters.has(idx)) activeSubFilters.delete(idx);
  else activeSubFilters.add(idx);
  renderMapMarkers();
}

/* ═══════════════════════════════════════════
   ALGORITMO DE GRAVEDAD
═══════════════════════════════════════════ */
function calcGravity(record, tabScope) {
  let score = 0;
  const r = { M:[], R:[], B:[], NE:[] };
  const auths = new Set();
  SECCIONES.forEach(sec => {
    if (tabScope !== 'all' && sec.prefix !== tabScope) return;
    sec.items.forEach((item, idx) => {
      const val = record[`${sec.prefix}_v_${idx}`];
      if      (val === 'M') { score += 3; r.M.push({sec:sec.titulo, item}); if(sec.prefix==='infra') auths.add('Obras Públicas / SIDURT'); if(sec.prefix==='amb') auths.add('SPA / CONAGUA'); if(sec.prefix==='soc') auths.add('DIF / Bienestar'); if(sec.prefix==='seg') auths.add('Seguridad Pública Municipal'); }
      else if (val === 'R') { score += 1; r.R.push({sec:sec.titulo, item}); }
      else if (val === 'B') { r.B.push({sec:sec.titulo, item}); }
      else                  { r.NE.push({sec:sec.titulo, item}); }
    });
  });
  return { score, r, auths: [...auths] };
}

function isAdminRecord(r) {
  return r.tipo === 'admin_gestion' || r.tipo_inspeccion === 'admin_gestion' ||
         (r.gestion_titulo && r.gestion_titulo.length > 2 && !r.lat_audit);
}

/* ═══════════════════════════════════════════
   RENDER MARKERS
═══════════════════════════════════════════ */
function renderMapMarkers() {
  mapMarkers.forEach(m => map.removeLayer(m));
  mapMarkers = [];

  const records = getFilteredRecords();

  records.forEach(record => {
    const lat = parseFloat(record.lat);
    const lng = parseFloat(record.lng);
    if (!lat || !lng || lat === 0 || lng === 0) return;

    const isAdmin = isAdminRecord(record);

    // Filtro por tab
    if (currentTab !== 'all') {
      if (currentTab === 'acciones' && !isAdmin) return;
      if (currentTab !== 'acciones' && isAdmin) return;
      if (!isAdmin && record.tipo !== currentTab && record.tipo !== 'completa') return;
    }

    // Sub-filtros de indicador
    if (!isAdmin && currentTab !== 'all' && currentTab !== 'acciones' && activeSubFilters.size > 0) {
      const match = [...activeSubFilters].some(idx => {
        const v = record[`${currentTab}_v_${idx}`];
        return v === 'M' || v === 'R';
      });
      if (!match) return;
    }

    const grav = isAdmin ? { score:0, r:{M:[],R:[],B:[],NE:[]}, auths:[] } : calcGravity(record, currentTab);
    record._grav = grav;

    // Crear marcador
    let html, size = 26;
    if (isAdmin) {
      size = 32;
      html = `<div class="m-admin" style="width:${size}px;height:${size}px;">⭐</div>`;
    } else {
      const hThresh = currentTab === 'all' ? 12 : 6;
      const mThresh = currentTab === 'all' ? 4  : 2;
      let cls = 'sev-low';
      if      (grav.score >= hThresh) { cls = 'sev-high'; size = currentTab==='all'?44:38; }
      else if (grav.score >= mThresh) { cls = 'sev-med';  size = currentTab==='all'?34:30; }
      html = `<div class="sev-marker ${cls}" style="width:${size}px;height:${size}px;font-size:${Math.round(size*.38)}px;">${grav.score}</div>`;
    }

    const marker = L.marker([lat, lng], {
      icon: L.divIcon({ className:'', html, iconSize:[size,size], iconAnchor:[size/2,size/2] })
    }).addTo(map);

    // Tooltip
    const tipTitle = isAdmin ? `⭐ ${record.gestion_titulo||'Proyecto'}` : (record.lugar_tramo || 'Punto auditado');
    let tipBody = `<strong style="font-size:11px;text-transform:uppercase;border-bottom:1px solid #334155;display:block;padding-bottom:6px;margin-bottom:6px;">${tipTitle}</strong>`;
    if (isAdmin) {
      tipBody += `<span style="font-size:10px;color:#fbbf24;">📅 ${record.gestion_fecha||'Sin agendar'}</span>`;
    } else {
      const top = [...grav.r.M.slice(0,2), ...grav.r.R.slice(0,1)];
      if (top.length > 0) {
        top.forEach(f => { tipBody += `<div style="font-size:10px;margin:2px 0;">${grav.r.M.includes(f)?'🔴':'🟡'} ${f.item}</div>`; });
        const more = grav.r.M.length + grav.r.R.length - top.length;
        if (more > 0) tipBody += `<div style="font-size:9px;color:#94a3b8;margin-top:3px;">+${more} más…</div>`;
      } else {
        tipBody += `<span style="font-size:10px;color:#4ade80;">✅ Zona Estable</span>`;
      }
    }
    tipBody += `<div style="font-size:9px;color:#475569;margin-top:5px;font-family:monospace;">${record.inspector||'Admin'} · ${record.fecha_captura||''}</div>`;

    marker.bindTooltip(tipBody, { direction:'top', offset:[0,-10], className:'ctip' });
    marker.on('click', () => openDetailModal(record));
    mapMarkers.push(marker);
  });
}

function centerOn(lat, lng) {
  map.setView([lat, lng], 17, { animate:true });
}

/* ═══════════════════════════════════════════
   MODAL DE DETALLE
   Jerarquía: Identidad → Fotos → Indicadores → Conclusiones
═══════════════════════════════════════════ */
function openDetailModal(data) {
  const isAdmin = isAdminRecord(data);
  const grav    = isAdmin ? { score:0, r:{M:[],R:[],B:[],NE:[]}, auths:[] }
                          : (data._grav || calcGravity(data, currentTab));

  // ── Header ──
  document.getElementById('md-folio').textContent = data.folio || 'SIN FOLIO';
  document.getElementById('md-title').textContent = data.lugar_tramo || data.gestion_titulo || 'Ubicación Georeferenciada';

  // Identidad del hallazgo: inspector + fecha + hora
  const ts = data.timestamp_utc ? new Date(data.timestamp_utc) : null;
  const horaStr = ts ? ts.toLocaleTimeString('es-MX', { hour:'2-digit', minute:'2-digit' }) : '';
  document.getElementById('md-meta').textContent =
    `👤 ${data.inspector||'Administración CERT'}  ·  📅 ${data.fecha_captura||'-'}${horaStr?' · ⏰ '+horaStr:''}`;
  document.getElementById('md-gps').textContent =
    data.gps_coords ? `📍 ${data.gps_coords}` : (data.lat ? `📍 ${data.lat}, ${data.lng}` : '');

  // Badge tipo
  const badgeEl = document.getElementById('md-badge');
  badgeEl.textContent = isAdmin
    ? 'PROYECTO / EVENTO'
    : `AUDITORÍA · ${(data.tipo||data.tipo_inspeccion||'INTEGRAL').toUpperCase()}`;
  badgeEl.style.background = isAdmin ? '#d97706' : '#2563eb';
  badgeEl.style.color      = isAdmin ? '#000'    : '#bfdbfe';

  // Badge gravedad
  const gravBadge = document.getElementById('md-gravity-badge');
  if (!isAdmin) {
    const hThr = currentTab==='all'?12:6, mThr = currentTab==='all'?4:2;
    let bg='#166534', col='#86efac', label='Estable';
    if      (grav.score >= hThr) { bg='#7f1d1d'; col='#fca5a5'; label='🔴 URGENTE'; }
    else if (grav.score >= mThr) { bg='#78350f'; col='#fde68a'; label='🟡 PREVENTIVO'; }
    else                         { label='🟢 ESTABLE'; }
    gravBadge.textContent  = `Score ${grav.score} · ${label}`;
    gravBadge.style.cssText= `background:${bg};color:${col};font-family:var(--mono);font-size:10px;font-weight:700;padding:3px 14px;border-radius:99px;display:inline-block;letter-spacing:.05em;`;
  } else {
    gravBadge.style.display = 'none';
  }

  // ── Body ──
  const body = document.getElementById('md-body');

  if (isAdmin) {
    // Proyecto / Evento
    body.innerHTML = `
      <div class="detail-sec" style="background:#fffbeb;border-color:#fde68a;margin-bottom:14px;">
        <div class="detail-sec-title" style="color:#92400e;">⭐ Ficha del Proyecto</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;font-size:13px;">
          ${field('Tipo',        data.gestion_tipo||'-',            '#92400e')}
          ${field('Título',      data.gestion_titulo||'-',          '#92400e')}
          ${field('📅 Fecha',    data.gestion_fecha||'Sin definir', '#92400e')}
          ${field('⏰ Hora',     data.gestion_hora||'--:--',        '#92400e')}
          ${field('📱 WhatsApp', data.gestion_wa||'No registrado',  '#2563eb')}
          ${field('Dependencias',(data.gestion_auths&&data.gestion_auths.length)?data.gestion_auths.join(' · '):'Ninguna','#991b1b')}
        </div>
        ${data.gestion_desc?`<div style="margin-top:12px;font-size:13px;color:#374151;background:#fff;padding:12px;border-radius:8px;border:1px solid #fde68a;line-height:1.7;">${data.gestion_desc}</div>`:''}
      </div>
      ${buildFotoSection(data)}`;

  } else {
    // Auditoría – fotos PRIMERO, luego indicadores y conclusiones
    const fotosHtml = buildFotoSection(data);

    // Indicadores agrupados
    let critHtml = '', prevHtml = '', okHtml = '';
    grav.r.M.forEach(f => { critHtml += indRow(f.item, f.sec, 'M'); });
    grav.r.R.forEach(f => { prevHtml += indRow(f.item, f.sec, 'R'); });
    grav.r.B.forEach(f => { okHtml   += indRow(f.item, f.sec, 'B'); });

    const indHtml = [
      critHtml ? `<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:#991b1b;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;margin-top:4px;">🔴 Crítico (${grav.r.M.length})</div>${critHtml}` : '',
      prevHtml ? `<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:#92400e;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;margin-top:10px;">🟡 Preventivo (${grav.r.R.length})</div>${prevHtml}` : '',
      okHtml   ? `<div style="font-family:var(--mono);font-size:9px;font-weight:700;color:#166534;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;margin-top:10px;">🟢 Bueno (${grav.r.B.length})</div>${okHtml}` : '',
    ].filter(Boolean).join('') || '<p style="font-size:12px;color:#94a3b8;text-align:center;padding:16px;">Sin indicadores evaluados.</p>';

    body.innerHTML = `
      ${fotosHtml}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;">
        <div class="detail-sec" style="grid-column:1/-1;">
          <div class="detail-sec-title">📊 Indicadores Evaluados</div>
          <div style="max-height:260px;overflow-y:auto;padding-right:4px;" class="noscroll">${indHtml}</div>
          ${grav.auths.length?`
            <div style="background:#eff6ff;border-radius:10px;padding:10px 14px;margin-top:12px;border:1px solid #bfdbfe;">
              <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:#1e40af;text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">Dependencias Recomendadas</div>
              <div style="display:flex;flex-wrap:wrap;gap:6px;">
                ${grav.auths.map(a=>`<span style="background:#dbeafe;color:#1e40af;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px;">${a}</span>`).join('')}
              </div>
            </div>`:''}
        </div>
        <div class="detail-sec">
          <div class="detail-sec-title" style="color:#dc2626;">🔴 Problemáticas</div>
          <div style="font-size:13px;color:#374151;line-height:1.7;">${data.problemas||'<span style="color:#94a3b8;">Sin comentarios registrados.</span>'}</div>
        </div>
        <div class="detail-sec">
          <div class="detail-sec-title" style="color:#16a34a;">🟢 Propuestas</div>
          <div style="font-size:13px;color:#374151;line-height:1.7;">${data.oportunidades||'<span style="color:#94a3b8;">Sin propuestas registradas.</span>'}</div>
        </div>
      </div>`;
  }

  document.getElementById('detailModal').classList.add('open');
}

/* ── Helpers ── */
function field(label, value, color='#64748b') {
  return `<div>
    <div style="font-size:10px;font-weight:700;color:${color};text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">${label}</div>
    <div style="font-size:13px;font-weight:600;color:#0f172a;">${value}</div>
  </div>`;
}
function indRow(item, sec, level) {
  const bg = level==='M'?'#fff5f5':level==='R'?'#fffbeb':'#f0fdf4';
  const col= level==='M'?'#991b1b':level==='R'?'#92400e':'#166534';
  return `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-radius:8px;background:${bg};margin-bottom:4px;">
    <span style="font-size:12px;font-weight:600;color:${col};">${item}</span>
    <span style="font-size:9px;color:${col};opacity:.6;font-family:var(--mono);white-space:nowrap;margin-left:8px;">${sec}</span>
  </div>`;
}

/* ── Sección de fotos: URL (3.0) con fallback a base64 (legacy) ──
   Muestra: foto grande, GPS del momento exacto, timestamp, zona del registro ── */
function buildFotoSection(record) {
  const src = record.fotos || record.fotos_georeferenciadas || {};
  const entries = Object.entries(src);

  if (!entries.length) {
    return `<div class="detail-sec">
      <div class="detail-sec-title">📸 Evidencia Fotográfica</div>
      <div style="border:2px dashed #e2e8f0;border-radius:10px;padding:20px;text-align:center;font-size:12px;color:#94a3b8;">Sin fotografías vinculadas a este registro.</div>
    </div>`;
  }

  const cards = entries.map(([key, foto]) => {
    const imgSrc = foto.url || foto.data || '';
    const lat    = foto.lat  ? parseFloat(foto.lat).toFixed(5)  : null;
    const lng    = foto.lng  ? parseFloat(foto.lng).toFixed(5)  : null;
    const tsRaw  = foto.ts   ? new Date(foto.ts) : null;
    const tsDate = tsRaw ? tsRaw.toLocaleDateString('es-MX') : null;
    const tsHour = tsRaw ? tsRaw.toLocaleTimeString('es-MX', {hour:'2-digit',minute:'2-digit'}) : null;

    // Etiqueta legible del slot de foto
    const slotLabel = key
      .replace(/_/g,' ')
      .replace(/([a-z])(\d)/g,'$1 $2')
      .replace(/^(infra|amb|soc|seg|gestion|gps|m)\s?/i, s => ({infra:'Infraest. ',amb:'Ambiente ',soc:'Social ',seg:'Seguridad ',gestion:'Gestión ',gps:'GPS ',m:'Marcha '}[s.toLowerCase()]||s))
      .trim();

    return `<div style="background:#fff;border:1px solid #e2e8f0;border-radius:12px;overflow:hidden;">
      <div style="position:relative;cursor:zoom-in;" onclick="openFotoViewer('${imgSrc}','${slotLabel}','${lat||''}','${lng||''}','${tsDate||''}','${tsHour||''}','${record.inspector||''}','${record.fecha_captura||''}')">
        <img src="${imgSrc}" style="width:100%;height:160px;object-fit:cover;display:block;">
        <div style="position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.7));padding:8px 10px;">
          <div style="font-family:var(--mono);font-size:9px;font-weight:700;color:#fff;text-transform:uppercase;">${slotLabel}</div>
        </div>
        <div style="position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border-radius:6px;padding:2px 6px;font-family:var(--mono);font-size:8px;color:#fff;">🔍 ver</div>
      </div>
      <div style="padding:8px 10px;background:#f8fafc;">
        ${lat?`<div style="font-family:var(--mono);font-size:9px;color:#2563eb;margin-bottom:2px;">📍 ${lat}, ${lng}</div>`:'<div style="font-size:9px;color:#94a3b8;margin-bottom:2px;">📍 Sin GPS</div>'}
        ${tsDate?`<div style="font-family:var(--mono);font-size:9px;color:#64748b;">📅 ${tsDate} · ⏰ ${tsHour}</div>`:''}
      </div>
    </div>`;
  }).join('');

  return `<div class="detail-sec">
    <div class="detail-sec-title">📸 Evidencia Fotográfica · ${entries.length} foto${entries.length!==1?'s':''} georeferenciada${entries.length!==1?'s':''}</div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;">${cards}</div>
  </div>`;
}

/* ── Visor de foto a pantalla completa con metadata ── */
function openFotoViewer(src, slot, lat, lng, fecha, hora, inspector, fechaReg) {
  const existing = document.getElementById('foto-viewer');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'foto-viewer';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;';
  overlay.onclick = () => overlay.remove();

  overlay.innerHTML = `
    <button onclick="document.getElementById('foto-viewer').remove()" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,.12);border:none;border-radius:50%;width:38px;height:38px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
    <img src="${src}" style="max-width:100%;max-height:75dvh;object-fit:contain;border-radius:10px;box-shadow:0 20px 60px rgba(0,0,0,.8);" onclick="event.stopPropagation()">
    <div style="margin-top:14px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center;">
      ${slot?`<span style="background:#1e293b;color:#94a3b8;font-family:monospace;font-size:10px;font-weight:700;padding:5px 12px;border-radius:99px;text-transform:uppercase;">${slot}</span>`:''}
      ${fecha?`<span style="background:#1e293b;color:#60a5fa;font-family:monospace;font-size:10px;font-weight:700;padding:5px 12px;border-radius:99px;">📅 ${fecha} · ⏰ ${hora}</span>`:''}
      ${lat?`<span style="background:#1e293b;color:#34d399;font-family:monospace;font-size:10px;font-weight:700;padding:5px 12px;border-radius:99px;">📍 ${lat}, ${lng}</span>`:''}
      ${inspector?`<span style="background:#1e293b;color:#a78bfa;font-family:monospace;font-size:10px;font-weight:700;padding:5px 12px;border-radius:99px;">👤 ${inspector}</span>`:''}
      ${fechaReg&&fechaReg!==fecha?`<span style="background:#1e293b;color:#94a3b8;font-family:monospace;font-size:10px;font-weight:700;padding:5px 12px;border-radius:99px;">Registro: ${fechaReg}</span>`:''}
    </div>
    <a href="${src}" target="_blank" onclick="event.stopPropagation()" style="margin-top:10px;font-family:monospace;font-size:10px;color:#64748b;text-decoration:none;">↗ Abrir en nueva pestaña</a>`;

  document.body.appendChild(overlay);
}

/* ═══════════════════════════════════════════
   MODO AGENDA – click en mapa
═══════════════════════════════════════════ */
function toggleAddMode() {
  isAddMode = !isAddMode;
  const btn  = document.getElementById('btn-add-action');
  const hint = document.getElementById('add-hint');
  const mapEl = document.getElementById('map');
  if (isAddMode) {
    btn.textContent = '❌ Cancelar Modo Agenda';
    btn.className   = 'add-btn active-mode';
    hint.style.display = 'block';
    mapEl.classList.add('crosshair');
  } else {
    btn.textContent = '➕ Agendar Proyecto / Evento';
    btn.className   = 'add-btn idle';
    hint.style.display = 'none';
    mapEl.classList.remove('crosshair');
  }
}

map.on('click', function(e) {
  if (!isAddMode) return;
  tempCoords = e.latlng;
  document.getElementById('create-coords').textContent = `${tempCoords.lat.toFixed(6)}, ${tempCoords.lng.toFixed(6)}`;
  document.getElementById('form-evento').reset();
  document.getElementById('c-foto-preview').style.display = 'none';
  adminPhotoB64 = null;
  toggleAddMode();
  document.getElementById('createModal').classList.add('open');
});

/* ═══════════════════════════════════════════
   GUARDAR EVENTO ADMIN – con Storage + folio único
═══════════════════════════════════════════ */
function previewAdminPhoto(input) {
  if (!input.files || !input.files[0]) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.src = e.target.result;
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > 800) { h = Math.round(h*800/w); w = 800; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      adminPhotoB64 = canvas.toDataURL('image/jpeg', 0.65);
      const prev = document.getElementById('c-foto-preview');
      prev.src = adminPhotoB64;
      prev.style.display = 'block';
    };
  };
  reader.readAsDataURL(input.files[0]);
}

async function saveAdminEvent() {
  const titulo = document.getElementById('c-titulo').value.trim();
  if (!titulo) { showToast('El título es obligatorio', 'err'); return; }
  if (!tempCoords) { showToast('Sin coordenadas GPS', 'err'); return; }

  const btn = document.getElementById('btn-save-evento');
  btn.textContent = '⏳ Guardando…';
  btn.disabled = true;

  try {
    const deps = [];
    document.querySelectorAll('#c-deps input:checked').forEach(cb => deps.push(cb.value));

    const folio = await window.certCloud.reserveFolio('ADM');
    const now   = new Date();

    let fotosObj = {};
    if (adminPhotoB64) {
      try {
        const url = await window.certCloud.uploadPhoto(adminPhotoB64, `cert_fotos/${folio}/admin_${Date.now()}.jpg`);
        fotosObj['admin_foto'] = { url, lat: tempCoords.lat, lng: tempCoords.lng, ts: now.toISOString() };
      } catch(e) {
        fotosObj['admin_foto'] = { data: adminPhotoB64, lat: tempCoords.lat, lng: tempCoords.lng, ts: now.toISOString(), pendingUpload: true };
      }
    }

    const record = {
      folio,
      tipo:              'admin_gestion',
      tipo_inspeccion:   'admin_gestion',
      inspector:         'Administración CERT',
      lugar_tramo:       titulo,
      gestion_tipo:      document.getElementById('c-tipo').value,
      gestion_titulo:    titulo,
      gestion_desc:      document.getElementById('c-desc').value,
      gestion_fecha:     document.getElementById('c-fecha').value,
      gestion_hora:      document.getElementById('c-hora').value,
      gestion_wa:        document.getElementById('c-wa').value,
      gestion_auths:     deps,
      lat:               tempCoords.lat,
      lng:               tempCoords.lng,
      gps_coords:        `${tempCoords.lat.toFixed(6)}, ${tempCoords.lng.toFixed(6)}`,
      fecha_captura:     now.toLocaleDateString('es-MX'),
      timestamp_utc:     now.toISOString(),
      fotos:             fotosObj,
    };

    await window.certCloud.addDoc(
      window.certCloud.collection(window.certCloud.db, 'cert_registros'), record
    );

    closeOverlay('createModal');
    showToast(`Evento publicado · ${folio}`, 'ok');
  } catch(e) {
    console.error(e);
    showToast('Error al guardar evento', 'err');
  }

  btn.textContent = '✅ Publicar en Mapa';
  btn.disabled = false;
}

/* ═══════════════════════════════════════════
   EXPORT EXCEL – todos los registros visibles
═══════════════════════════════════════════ */
function exportExcel() {
  const records = getFilteredRecords();
  if (!records.length) { showToast('Sin registros para exportar', 'warn'); return; }
  const wb = XLSX.utils.book_new();

  // Hoja 1 – Resumen
  const resumen = records.map(r => {
    const g = calcGravity(r, 'all');
    return {
      FOLIO: r.folio||'-', FECHA: r.fecha_captura||'-', INSPECTOR: r.inspector||'-',
      BRIGADA: r.brigada||'-', LUGAR: r.lugar_tramo||'-', TIPO: r.tipo||r.tipo_inspeccion||'-',
      LAT: r.lat||0, LNG: r.lng||0, SCORE: g.score, CRITICOS: g.r.M.length, REGULARES: g.r.R.length,
      PROBLEMAS: r.problemas||'-', PROPUESTAS: r.oportunidades||'-',
    };
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(resumen), 'Resumen');

  // Hoja 2 – Indicadores
  const det = [];
  records.filter(r => !isAdminRecord(r)).forEach(r => {
    SECCIONES.forEach(sec => {
      sec.items.forEach((item, idx) => {
        const val = r[`${sec.prefix}_v_${idx}`];
        if (val) det.push({ FOLIO:r.folio, LUGAR:r.lugar_tramo, SECCION:sec.titulo, INDICADOR:item,
          EVAL: val==='B'?'Bueno':val==='R'?'Regular':val==='M'?'Malo':'N/E', LAT:r.lat, LNG:r.lng });
      });
    });
  });
  if (det.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(det), 'Indicadores');

  // Hoja 3 – Fotos
  const fotos = [];
  records.forEach(r => {
    const src = r.fotos || r.fotos_georeferenciadas || {};
    Object.entries(src).forEach(([k, f]) => {
      fotos.push({ FOLIO:r.folio, LUGAR:r.lugar_tramo, FOTO_ID:k,
        URL: f.url||'(base64-local)', LAT_FOTO:f.lat||0, LNG_FOTO:f.lng||0, TIMESTAMP:f.ts||'-' });
    });
  });
  if (fotos.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(fotos), 'Fotos_Georef');

  const today = new Date().toLocaleDateString('es-MX').replace(/\//g,'-');
  XLSX.writeFile(wb, `CERT_Dashboard_${today}.xlsx`);
  showToast('Excel descargado ✓', 'ok');
}

/* ═══════════════════════════════════════════
   UTILIDADES
═══════════════════════════════════════════ */
function closeOverlay(id) {
  document.getElementById(id).classList.remove('open');
}

let _toastT;
function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className   = 'show ' + type;
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.className='', 2800);
}
</script>
